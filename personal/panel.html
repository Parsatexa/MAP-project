<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <title></title>
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link rel="stylesheet" href="style3.css">
    </head>
    <body class="Profile">
        <div class="header">
            <h1>Account Security</h1>
            <p>Manage your personal information and login credentials.</p>
        </div>
        <section class="sec">
            <h1>Public Profile</h1>
            <p>This information will be displayed on your curator page.</p>
            <form action="" class="form">
                <div class="inputbox">
                    <label>Username</label>
                    <input type="text" class="user">
                </div>
                <div class="inputbox">
                    <label>Email</label>
                    <input type="email" class="user">
                </div>
                <div class="inputbox" style="flex: 1 1 100%;">
                    <label>Short Bio</label>
                    <textarea class="Bio"></textarea>
                </div>
            </form>
        </section>
    </body>
</html>
